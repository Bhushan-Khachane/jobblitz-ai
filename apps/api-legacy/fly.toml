app = "jobblitz-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
