version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobblitz
      POSTGRES_PASSWORD: jobblitz
      POSTGRES_DB: jobblitz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobblitz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Legacy Python Services (operational during migration) ───────────────────
  api-legacy:
    build: ./apps/api-legacy
    ports:
      - "8004:8000"
    env_file:
      - ./.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      - NEKO_PUBLIC_HOST=localhost
      - ADK_ORCHESTRATOR_URL=http://orchestrator-legacy:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - screenshots_data:/app/screenshots
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  orchestrator-legacy:
    build: ./apps/orchestrator-legacy
    ports:
      - "8005:8001"
    env_file:
      - ./.env
    environment:
      - ADK_API_URL=http://api-legacy:8000/api/v1
      - BACKEND_API_URL=http://api-legacy:8000/api/v1
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app/packages
    volumes:
      - ./packages:/app/packages:ro
    depends_on:
      - redis
      - api-legacy
    restart: unless-stopped

  browser-worker-legacy:
    build: ./apps/browser-worker-legacy
    ports:
      - "8006:8002"
    environment:
      - HEADLESS=true
      - SESSION_DIR=/data/sessions
    volumes:
      - sessions:/data/sessions
    depends_on:
      - redis
    restart: unless-stopped

  # ── New TypeScript Services ─────────────────────────────────────────────────
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://jobblitz:jobblitz@postgres:5432/jobblitz
      - REDIS_URL=redis://redis:6379/0
      - API_URL=http://api:8000
      - WEB_URL=http://web:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - screenshots_data:/app/screenshots
    restart: unless-stopped

  worker-orchestrator:
    build: ./apps/worker-orchestrator
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://jobblitz:jobblitz@postgres:5432/jobblitz
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-browser:
    build: ./apps/worker-browser
    ports:
      - "8002:8002"
    environment:
      - HEADLESS=true
      - SESSION_DIR=/data/sessions
    volumes:
      - sessions:/data/sessions
    depends_on:
      - redis
    restart: unless-stopped

  mcp-gateway:
    build: ./apps/mcp-gateway
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://jobblitz:jobblitz@postgres:5432/jobblitz
      - REDIS_URL=redis://redis:6379/0
      - MCP_API_KEY=${MCP_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  pgdata:
  redisdata:
  uploads_data:
  screenshots_data:
  sessions:
